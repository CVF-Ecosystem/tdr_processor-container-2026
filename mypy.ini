[mypy]
# Global mypy configuration for TDR Processor v3.0

# Python version
python_version = 3.11

# Error output
show_error_context = True
show_error_codes = True
show_column_numbers = True
pretty = True

# Strictness settings (gradually enforce)
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True

# Disallow incomplete types - start permissive
disallow_incomplete_defs = False
disallow_untyped_defs = False
disallow_untyped_calls = False

# Imports
ignore_missing_imports = True

# Output
junit_xml = mypy-junit.xml

[mypy-config.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-utils.logger_setup]
ignore_errors = True

